[project]
name = "jmri-cli"
version = "1.0.0rc3"
description = "Command-line client for JMRI - control DCC model railroads from a terminal"
readme = "README.md"
requires-python = ">=3.10"
license = "AGPL-3.0-or-later"
license-files = ["LICENSE"]
authors = [
    { name = "HO PROJECT", email = "HO44-PROJECT@users.noreply.github.com" },
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Environment :: Console",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Home Automation",
    "Operating System :: OS Independent",
]
dependencies = [
    "jmri-core==1.0.0rc3",
    "tabulate~=0.10",
]

[project.optional-dependencies]
test = [
    "jmri-core[test]==1.0.0rc3",
]

[project.urls]
Homepage = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"
Repository = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"

[project.scripts]
jmri-cli = "jmri_cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jmri_cli"]
