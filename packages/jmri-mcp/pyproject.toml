[project]
name = "jmri-mcp"
version = "0.1.0"
description = "MCP server for JMRI - voice/chat control of DCC model railroads (xiaozhi, Claude, ...)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "AGPL-3.0-or-later" }
dependencies = [
    "jmri-core==0.1.0",
    "mcp>=1.8.1",
]

[project.optional-dependencies]
xiaozhi = [
    "python-dotenv>=1.0",
]
test = [
    "jmri-core[test]==0.1.0",
]

[project.urls]
Homepage = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"
Repository = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"

[project.scripts]
jmri-mcp = "jmri_mcp.server:main"
jmri-xiaozhi-bridge = "xiaozhi_wrapper:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jmri_mcp", "src/xiaozhi_wrapper"]
