; Local config for tests/test_live.py — copy to live.ini and edit.
; live.ini is gitignored: it names your private network address and the
; system you're comfortable toggling power on for tests, so it shouldn't
; be committed.

[jmri]
; Your JMRI web server. Optional — if omitted, falls back to the JMRI_URL
; env var already used everywhere else in this project. Only set this (or
; JMRI_URL_LIVE) if the live suite should point somewhere different from
; your normal JMRI_URL.
; url = http://10.0.20.20:12080

; System used by write tests (set_power). Pick one you don't mind toggling —
; not necessarily the default system. Matched with the same tolerant
; resolution as the tools (name, prefix, or fragment).
write_test_system = Zou

; Write tests (power on/off round-trips) are skipped unless this is true.
; They drive a real relay on real DCC hardware — opt in deliberately.
enable_write_tests = false

; Minimum seconds the write test waits after toggling before toggling back,
; to avoid rapid on/off cycling on real electronics (relay wear, inrush
; current). Only enforced by the live test, not by set_power itself.
min_toggle_interval_seconds = 5
