[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
jmri-core = { workspace = true }
jmri-cli = { workspace = true }
jmri-mcp = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "-m 'not live' --import-mode=importlib"
markers = [
    "live: requires a real, reachable JMRI server (opt-in, see tests/test_live.py)",
]
