[project]
name = "jmri-mcp"
version = "1.0.0"
description = "MCP server for JMRI - voice/chat control of DCC model railroads (xiaozhi, Claude, ...)"
readme = "README.md"
requires-python = ">=3.10"
license = "AGPL-3.0-or-later"
license-files = ["LICENSE"]
authors = [
    { name = "HO PROJECT", email = "HO44-PROJECT@users.noreply.github.com" },
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Home Automation",
    "Operating System :: OS Independent",
]
dependencies = [
    "jmri-core==1.0.0",
    "mcp~=1.28",
]

[project.optional-dependencies]
xiaozhi = [
    "python-dotenv~=1.2",
]
test = [
    "jmri-core[test]==1.0.0",
]

[project.urls]
Homepage = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"
Repository = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"

[project.scripts]
jmri-mcp = "jmri_mcp.server:main"
jmri-xiaozhi-bridge = "xiaozhi_wrapper:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jmri_mcp", "src/xiaozhi_wrapper"]
