[project]
name = "jmri-core"
version = "0.1.0"
description = "Shared JMRI HTTP/WebSocket client foundation for jmri-cli and jmri-mcp"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "AGPL-3.0-or-later" }
dependencies = [
    "httpx>=0.27",
    "websockets>=11.0.3",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
]

[project.entry-points.pytest11]
jmri_core_testing = "jmri_core.testing.plugin"

[project.urls]
Homepage = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"
Repository = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jmri_core"]
