[project]
name = "jmri-cli"
version = "0.1.0"
description = "Command-line client for JMRI - control DCC model railroads from a terminal"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "AGPL-3.0-or-later" }
dependencies = [
    "jmri-core==0.1.0",
    "tabulate>=0.9",
]

[project.optional-dependencies]
test = [
    "jmri-core[test]==0.1.0",
]

[project.urls]
Homepage = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"
Repository = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"

[project.scripts]
jmri-cli = "jmri_cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jmri_cli"]
