[project]
name = "jmri-core"
version = "1.0.0"
description = "Shared JMRI HTTP/WebSocket client foundation for jmri-cli and jmri-mcp"
readme = "README.md"
requires-python = ">=3.10"
license = "AGPL-3.0-or-later"
license-files = ["LICENSE"]
authors = [
    { name = "HO PROJECT", email = "HO44-PROJECT@users.noreply.github.com" },
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Home Automation",
    "Topic :: Software Development :: Libraries",
    "Operating System :: OS Independent",
]
dependencies = [
    "httpx~=0.28",
    "websockets~=16.1",
]

[project.optional-dependencies]
test = [
    "pytest~=9.1",
    "pytest-asyncio~=1.4",
    "respx~=0.23",
]

[project.entry-points.pytest11]
jmri_core_testing = "jmri_core.testing.plugin"

[project.urls]
Homepage = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"
Repository = "https://github.com/HO44-PROJECT/MrJ-JMRI-MCP"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/jmri_core"]

[tool.hatch.build.targets.sdist]
exclude = ["tests/config/live.ini"]
